services:
  - type: web
    name: yoodle-signaling
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: "10000"
      - key: ALLOWED_ORIGINS
        value: "https://yoodle.vercel.app,http://localhost:3000"
    healthCheckPath: /health
