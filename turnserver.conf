# ── coturn TURN server configuration ──────────────────────────────────
# This file configures coturn for WebRTC NAT traversal

# TURN listener port
listening-port=3478
tls-listening-port=5349

# External IP (set to your server's public IP)
# external-ip=YOUR_SERVER_PUBLIC_IP

# Relay port range
min-port=49152
max-port=49200

# Use fingerprint in TURN message
fingerprint

# Long-term credentials
lt-cred-mech

# Realm (use your domain)
realm=yoodle.app

# TURN server credentials (CHANGE THESE in production!)
user=yoodle:CHANGE_ME_IN_PRODUCTION

# Logging
log-file=/var/log/turnserver.log
verbose

# Disable multicast peers
no-multicast-peers

# Disable CLI
no-cli

# Disable TCP relay (saves resources for most WebRTC use cases)
no-tcp-relay

# Allow loopback addresses (useful during testing)
# no-loopback-peers

# Max allocation lifetime
max-allocate-lifetime=3600

# Channel lifetime
channel-lifetime=600

# Denied peer IPs (security: block private networks from relay)
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Process user quota
user-quota=12
total-quota=1200
